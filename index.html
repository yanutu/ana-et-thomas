// Animation canvas — particules dorées & pétales blancs
(function(){
  const canvas=document.getElementById('petals');
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  const GOLD=['#C9A86C','#D4AF6A','#E8D5A3','#B8923E','#F0E0B0'];
  const particles=[];

  // Particules dorées scintillantes
  for(let i=0;i<40;i++){
    particles.push({
      type:'dot',
      x:Math.random()*window.innerWidth,
      y:Math.random()*window.innerHeight,
      r:0.8+Math.random()*2.5,
      color:GOLD[Math.floor(Math.random()*GOLD.length)],
      vy:-(0.2+Math.random()*0.5),
      vx:(Math.random()-0.5)*0.4,
      alpha:Math.random(),
      alphaDir:Math.random()>0.5?0.005:-0.005,
      phase:Math.random()*Math.PI*2
    });
  }

  // Pétales blancs
  for(let i=0;i<16;i++){
    particles.push({
      type:'petal',
      x:Math.random()*window.innerWidth,
      y:Math.random()*window.innerHeight,
      w:8+Math.random()*10,
      h:14+Math.random()*16,
      rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-0.5)*0.015,
      vy:-(0.3+Math.random()*0.6),
      vx:Math.sin(Math.random()*Math.PI*2)*0.5,
      alpha:0.25+Math.random()*0.45,
      sway:Math.random()*Math.PI*2,
      swaySpeed:0.01+Math.random()*0.015
    });
  }

  function drawPetal(p){
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha=p.alpha;
    ctx.beginPath();
    ctx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fill();
    // Nervure centrale
    ctx.beginPath();
    ctx.moveTo(0,-p.h/2);
    ctx.lineTo(0,p.h/2);
    ctx.strokeStyle='rgba(220,210,200,0.4)';
    ctx.lineWidth=0.5;
    ctx.stroke();
    ctx.restore();
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const now=Date.now()/1000;
    for(const p of particles){
      if(p.type==='dot'){
        p.alpha+=p.alphaDir;
        if(p.alpha>=0.8||p.alpha<=0.05) p.alphaDir*=-1;
        p.x+=p.vx+Math.sin(now+p.phase)*0.3;
        p.y+=p.vy;
        if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}
        ctx.save();
        ctx.globalAlpha=p.alpha;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
        // Halo doré
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.5);
        g.addColorStop(0,p.color.replace(')',',0.3)').replace('rgb','rgba'));
        g.addColorStop(1,'transparent');
        ctx.fillStyle=g;
        ctx.fill();
        ctx.restore();
      } else {
        p.sway+=p.swaySpeed;
        p.x+=p.vx+Math.sin(p.sway)*0.6;
        p.y+=p.vy;
        p.rot+=p.rotV;
        if(p.y<-30){p.y=canvas.height+30;p.x=Math.random()*canvas.width;}
        drawPetal(p);
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

function compress(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas'),max=900;
        let w=img.width,h=img.height;
        if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
        c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',.72));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function loadPhotos(){
  document.getElementById('app').innerHTML='<div class="spinner">Chargement des souvenirs…</div>';
  const{data,error}=await db.from('photos').select('*').order('created_at',{ascending:false});
  if(!error)photos=data||[];
  render();
}

function showView(v){view=v;render();if(v==='gallery')loadPhotos();}
function fp(){return filter==='Tous'?photos:photos.filter(p=>p.moment===filter);}
function setFilter(f){filter=f;render();}
function openPhoto(i){selectedPhoto=photos[i];view='lightbox';render();}

async function likePhoto(e,id){
  e.stopPropagation();
  const p=photos.find(x=>x.id===id);if(!p)return;
  p.likes=(p.likes||0)+1;
  await db.from('photos').update({likes:p.likes}).eq('id',id);
  render();
}

async function handleFile(e){
  const f=e.target.files[0];if(!f)return;
  const d=await compress(f);form.imageData=d;form.preview=d;render();
}
function removePreview(){form.imageData=null;form.preview=null;render();}
function selectMoment(m){form.moment=m;render();}

async function handleSubmit(){
  const name=document.getElementById('f-name').value.trim();
  const message=document.getElementById('f-message').value.trim();
  const table_name='';
  if(!form.imageData||!name)return;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Envoi en cours…';
  const{error}=await db.from('photos').insert({name,message,image_data:form.imageData,table_name,moment:form.moment,likes:0});
  if(error){
    document.getElementById('f-err').textContent='Erreur. Photo trop grande ?';
    btn.disabled=false;btn.textContent='Partager ce souvenir';
  }else{
    form={name:'',message:'',imageData:null,preview:null,table_name:'',moment:''};
    showView('gallery');
  }
}

function startSlideshow(){
  const f=fp();if(!f.length)return;
  slideIdx=0;
  document.getElementById('slideshow').style.display='flex';
  updateSlide();
  slideTimer=setInterval(()=>{slideIdx=(slideIdx+1)%f.length;updateSlide();},4000);
}
function stopSlideshow(){clearInterval(slideTimer);document.getElementById('slideshow').style.display='none';}
function updateSlide(){
  const f=fp(),p=f[slideIdx];
  document.getElementById('slide-img').src=p.image_data;
  document.getElementById('slide-name').textContent=p.name+(p.table_name?' · Table '+p.table_name:'');
  document.getElementById('slide-msg').textContent=p.message?'"'+p.message+'"':'';
  document.getElementById('slide-dots').innerHTML=f.map((_,i)=>`<div class="slide-dot${i===slideIdx?' active':''}" onclick="goSlide(${i})"></div>`).join('');
}
function slidePrev(){const f=fp();slideIdx=(slideIdx-1+f.length)%f.length;updateSlide();}
function slideNext(){const f=fp();slideIdx=(slideIdx+1)%f.length;updateSlide();}
function goSlide(i){slideIdx=i;updateSlide();}

function downloadQR(){
  const a=document.createElement('a');
  a.download='qr-mariage-ana-thomas.png';
  a.href='data:image/png;base64,'+QR;
  a.click();
}

      ${f.length===0?`<div class="empty"><div class="o">✦</div><p>Aucune photo pour ce moment.<br/>Soyez les premiers à partager un souvenir !</p><button class="btn-gold" onclick="showView('upload')">Partager une photo</button></div>`:`
      <div class="mosaic">${f.map(p=>`
        <div class="mosaic-item" onclick="openPhoto(${photos.indexOf(p)})">
          <img src="${p.image_data}" alt=""/>
          <button class="like-btn" onclick="likePhoto(event,'${p.id}')">♥</button>
          ${(p.likes||0)>0?`<div class="like-count">♥ ${p.likes}</div>`:''}
          <div class="mosaic-overlay">
            ${p.moment?`<p class="m-moment">${p.moment}</p>`:''}
            <p class="m-name">${p.name}</p>
            ${p.message?`<p class="m-msg">"${p.message}"</p>`:''}
          </div>
        </div>`).join('')}
      </div>`}`;
  }
  if(view==='upload'){
    app.innerHTML=`
      <div class="upload-wrap">
        <button class="btn-ghost" onclick="showView('gallery')" style="margin-bottom:28px">← Retour</button>
        <div class="form-head"><p class="sup">✦ votre souvenir ✦</p><h2>Partager une photo</h2></div>
        ${!form.preview?`
          <div class="drop-zone" onclick="document.getElementById('fi').click()">
            <div style="font-size:22px;opacity:.35;margin-bottom:10px">✦</div>
            <p style="font-size:16px;margin-bottom:4px">Cliquez pour choisir une photo</p>
            <small style="color:#aaa;font-size:13px">JPG, PNG</small>
            <input id="fi" type="file" accept="image/*" style="display:none" onchange="handleFile(event)"/>
          </div>`:`
          <div class="preview-wrap">
            <img src="${form.preview}" alt=""/>
            <button class="rm-btn" onclick="removePreview()">✕</button>
          </div>`}
        <div class="fields">
          <div class="field"><label>Votre nom *</label><input id="f-name" placeholder="Ex : Marie &amp; Pierre"/></div>

          <div class="field"><label>Moment de la journée</label>
            <div class="moments-grid">${MOMENTS.map(m=>`<div class="moment-opt${form.moment===m?' selected':''}" onclick="selectMoment('${m}')">${m}</div>`).join('')}</div>
          </div>
          <div class="field"><label>Un petit mot</label><textarea id="f-message" rows="3" placeholder="Un souvenir, un vœu…"></textarea></div>
          <p id="f-err" class="err"></p>
          <button id="submit-btn" class="btn-gold" onclick="handleSubmit()" ${!form.imageData?'disabled':''} style="padding:14px;font-size:11px;letter-spacing:3px;margin-top:6px">Partager ce souvenir</button>
        </div>
      </div>`;
  }
  if(view==='lightbox'&&selectedPhoto){
    const p=selectedPhoto;
    app.innerHTML=`
      <div class="lightbox">
        <button class="btn-ghost" onclick="showView('gallery')" style="margin-bottom:24px">← Retour</button>
        <img src="${p.image_data}" style="width:100%;max-height:62vh;object-fit:contain;display:block"/>
        <div style="text-align:center;margin-top:20px;padding:20px 0 0;border-top:1px solid #E8D9C0">
          ${p.moment?`<p style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:#aaa;margin-bottom:8px">${p.moment}</p>`:''}
          <p style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;margin-bottom:6px">${p.name}</p>
          ${p.message?`<p style="font-style:italic;color:#888;font-size:17px;line-height:1.8">"${p.message}"</p>`:''}
          <button onclick="likePhoto(event,'${p.id}')" style="margin-top:16px;background:none;border:1px solid #ddd;padding:8px 22px;font-family:'Cormorant Garamond',serif;font-size:16px;cursor:pointer;color:#888;transition:all .2s">♥ ${p.likes||0} j'aime</button>
        </div>
      </div>`;
  }
  if(view==='qr'){
    app.innerHTML=`
      <div class="qr-wrap">
        <button class="btn-ghost" onclick="showView('gallery')" style="margin-bottom:28px">← Retour</button>
        <div class="form-head"><p class="sup">✦ partagez l'app ✦</p><h2>QR Code invités</h2></div>
        <div class="qr-box">
          <img src="data:image/png;base64,${QR}" style="width:250px;height:250px;display:block;margin:0 auto 20px"/>
          <p style="font-style:italic;color:#aaa;font-size:14px;margin-bottom:16px">yanutu.github.io/ana-et-thomas</p>
          <p style="font-style:italic;color:#888;font-size:15px;line-height:1.9;margin-bottom:22px">Imprimez ce QR code et placez-le sur les tables.<br/>Vos invités le scannent et accèdent directement à la galerie.</p>
          <button class="btn-gold" onclick="downloadQR()" style="padding:12px 28px">Télécharger le QR code</button>
        </div>
      </div>`;
  }
}

loadPhotos();
</script>
</body>
</html>
